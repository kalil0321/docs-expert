<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" fill="none">
  <!-- Background with dot grid -->
  <rect width="800" height="280" fill="#0a0a0f"/>
  <defs>
    <pattern id="grid-dark" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#1a1a2e"/>
    </pattern>
  </defs>
  <rect width="800" height="280" fill="url(#grid-dark)"/>

  <!-- System bar top -->
  <line x1="0" y1="28" x2="800" y2="28" stroke="#1e1e3a" stroke-width="1"/>

  <!-- Crosshair top-left -->
  <line x1="40" y1="48" x2="40" y2="64" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <line x1="32" y1="56" x2="48" y2="56" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>

  <!-- Crosshair bottom-right -->
  <line x1="760" y1="216" x2="760" y2="232" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <line x1="752" y1="224" x2="768" y2="224" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>

  <!-- Main title -->
  <text x="400" y="120" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="900" fill="#ededf4" letter-spacing="-2">docs-expert</text>

  <!-- Accent bar under title -->
  <rect x="310" y="132" width="180" height="4" rx="2" fill="#8b5cf6"/>

  <!-- Tagline -->
  <text x="400" y="168" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#71717a" font-weight="500">Query any docs AI. Zero keys. Zero cost.</text>

  <!-- Provider badges — centered, btn-sm style (fill + border + offset shadow) -->
  <g transform="translate(207, 196)">
    <!-- MINTLIFY -->
    <rect x="2" y="2" width="72" height="22" fill="#1e1e3a"/>
    <rect x="0" y="0" width="72" height="22" fill="#161622" stroke="#a78bfa" stroke-width="1"/>
    <text x="36" y="15" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="9" fill="#c4b5fd" font-weight="700">MINTLIFY</text>

    <!-- STRIPE -->
    <rect x="84" y="2" width="60" height="22" fill="#1e1e3a"/>
    <rect x="82" y="0" width="60" height="22" fill="#161622" stroke="#a78bfa" stroke-width="1"/>
    <text x="112" y="15" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="9" fill="#c4b5fd" font-weight="700">STRIPE</text>

    <!-- GITBOOK -->
    <rect x="154" y="2" width="64" height="22" fill="#1e1e3a"/>
    <rect x="152" y="0" width="64" height="22" fill="#161622" stroke="#a78bfa" stroke-width="1"/>
    <text x="184" y="15" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="9" fill="#c4b5fd" font-weight="700">GITBOOK</text>

    <!-- FERN -->
    <rect x="228" y="2" width="48" height="22" fill="#1e1e3a"/>
    <rect x="226" y="0" width="48" height="22" fill="#161622" stroke="#a78bfa" stroke-width="1"/>
    <text x="250" y="15" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="9" fill="#c4b5fd" font-weight="700">FERN</text>

    <!-- CLAUDE -->
    <rect x="286" y="2" width="62" height="22" fill="#1e1e3a"/>
    <rect x="284" y="0" width="62" height="22" fill="#161622" stroke="#a78bfa" stroke-width="1"/>
    <text x="315" y="15" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="9" fill="#c4b5fd" font-weight="700">CLAUDE</text>

    <!-- +4 -->
    <rect x="358" y="2" width="30" height="22" fill="#1e1e3a"/>
    <rect x="356" y="0" width="30" height="22" fill="#161622" stroke="#3b3b5c" stroke-width="1"/>
    <text x="371" y="15" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="9" fill="#6d6d8a" font-weight="700">+4</text>
  </g>

  <!-- Bottom bar -->
  <line x1="0" y1="252" x2="800" y2="252" stroke="#1e1e3a" stroke-width="1"/>
  <text x="16" y="268" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace" font-size="9" fill="#4a4a6a" letter-spacing="1" font-weight="700">9 PROVIDERS</text>
  <text x="784" y="268" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace" font-size="9" fill="#4a4a6a" letter-spacing="1" font-weight="700">MIT LICENSE</text>
</svg>
