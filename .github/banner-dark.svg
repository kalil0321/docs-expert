<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" fill="none">
  <rect width="600" height="180" rx="12" fill="#06060a"/>

  <!-- Prism icon -->
  <g transform="translate(218, 16)">
    <!-- Incoming beam -->
    <line x1="0" y1="36" x2="20" y2="36" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
    <!-- Prism triangle -->
    <path d="M24 8 L64 36 L24 64 Z" stroke="#8b5cf6" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    <!-- Refracted beams -->
    <line x1="64" y1="36" x2="84" y2="16" stroke="#c084fc" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="64" y1="36" x2="86" y2="30" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="64" y1="36" x2="86" y2="42" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="64" y1="36" x2="84" y2="56" stroke="#c084fc" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
    <!-- Dot accents -->
    <circle cx="84" cy="16" r="2" fill="#c084fc" opacity="0.6"/>
    <circle cx="84" cy="56" r="2" fill="#c084fc" opacity="0.6"/>
    <!-- Inner glow -->
    <circle cx="42" cy="36" r="12" fill="#8b5cf6" opacity="0.06"/>
  </g>

  <!-- Title -->
  <text x="300" y="118" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace" font-size="34" font-weight="700" fill="#ededf4" letter-spacing="-0.5">docs-expert</text>

  <!-- Divider -->
  <line x1="250" y1="132" x2="350" y2="132" stroke="#8b5cf6" stroke-width="2" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="300" y="156" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace" font-size="13" fill="#52525b" letter-spacing="0.5">query any documentation site's AI assistant</text>
</svg>
